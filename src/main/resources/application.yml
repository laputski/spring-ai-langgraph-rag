spring:
  application:
    name: spring-ai-langgraph-rag

  ai:
    ollama:
      base-url: http://localhost:11434
      init:
        pull-model-strategy: when_missing
      chat:
        options:
          model: llama3.2
          temperature: 0.1
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      qdrant:
        host: localhost
        port: 6334                  # gRPC port
        collection-name: tech-docs
        use-tls: false
        initialize-schema: true
        dimensions: 768             # nomic-embed-text output dimension

  data:
    redis:
      host: localhost
      port: 6379                    # Valkey is Redis-protocol compatible

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

guardrails:
  nemo:
    base-url: http://localhost:8001
    fail-open: true
  guardrails-ai:
    base-url: http://localhost:8000
    fail-open: true

cache:
  similarity-threshold: 0.92
  ttl: PT1H

app:
  seeder:
    enabled: true

logging:
  level:
    io.callicode.rag: INFO
    org.bsc.langgraph4j: INFO
